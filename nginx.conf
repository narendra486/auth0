server {
  listen 8000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /api/dummy/profile {
    default_type application/json;
    return 200 '{"ok":true,"page":"profile","message":"Dummy profile API response from server","server":"nginx"}';
  }

  location = /api/dummy/page-a {
    default_type application/json;
    return 200 '{"ok":true,"page":"A","status":"ready","message":"Dummy Page A served by server"}';
  }

  location = /api/dummy/page-b {
    default_type application/json;
    return 200 '{"ok":true,"page":"B","status":"ready","message":"Dummy Page B served by server"}';
  }

  location = /api/dummy/search {
    default_type application/json;
    return 200 '{"ok":true,"endpoint":"search","results":["demo result 1","demo result 2","demo result 3"]}';
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}
